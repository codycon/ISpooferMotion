name: Build Windows App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-app:
    name: Windows portable app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.19.5

      - name: Install dependencies
        run: node scripts/ci-install.js

      - name: Rebuild native app dependencies
        run: npm run rebuild:native

      - name: Run tests
        run: npm test

      - name: Run release sanity check
        run: npm run release:local-check

      - name: Run release hardening check
        run: npm run release:hardening-check

      - name: Build Windows portable app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_DISABLE_WIN_CODE_SIGN: true
        run: npm run build -- --win portable --publish never

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ISpooferMotion-Windows-App
          path: dist/*App*.exe
          if-no-files-found: error
