name: Build Linux App

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Linux packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsecret-1-dev python3 build-essential

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run release hardening check
        run: npm run release:hardening-check

      - name: Build Linux packages
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build -- --linux --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ISpooferMotion-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error
