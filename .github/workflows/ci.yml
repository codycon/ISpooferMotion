name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.3.11)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ci-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: ISpooferMotion-Windows
          - os: macos-latest
            artifact: ISpooferMotion-macOS
          - os: ubuntu-latest
            artifact: ISpooferMotion-Linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsecret-1-dev python3 build-essential

      - name: Install app dependencies
        run: node scripts/ci-install.js

      - name: Rebuild native app dependencies
        run: npm run rebuild:native

      - name: Run tests
        run: npm test

      - name: Run release sanity check (Windows only)
        if: runner.os == 'Windows'
        run: npm run release:local-check

      - name: Run release hardening check
        run: npm run release:hardening-check

      - name: Install Azure Trusted Signing client (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dest = "$env:GITHUB_WORKSPACE\azure-trusted-signing"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          nuget install Microsoft.Trusted.Signing.Client -Version 1.0.60 -OutputDirectory $dest -ExcludeVersion
          $dll = Get-ChildItem -Path $dest -Recurse -Filter "Azure.CodeSigning.Dlib.dll" | Where-Object { $_.FullName -like "*\bin\x64\*" } | Select-Object -First 1
          if (-not $dll) {
            Write-Error "Azure.CodeSigning.Dlib.dll not found after install."
            exit 1
          }
          echo "AZURE_DLIB_PATH=$($dll.FullName)" >> $env:GITHUB_ENV

      - name: Build Windows app EXE
        if: runner.os == 'Windows'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
        run: npm run build -- --win nsis --publish never

      - name: Build Roblox Studio plugin (Windows only)
        if: runner.os == 'Windows'
        run: npm run build:plugin

      - name: Build macOS app
        if: runner.os == 'macOS'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build -- --mac --universal --publish never

      - name: Build Linux packages
        if: runner.os == 'Linux'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build -- --linux --publish never

      - name: Cleanup unwanted artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Remove-Item dist/*__uninstaller.exe, dist/*.blockmap -ErrorAction SilentlyContinue

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.rbxmx
            dist/*.dmg
            dist/*.AppImage
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.version }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Ensure release tag is this commit
        run: |
          git fetch --tags --force
          EXISTING=$(git rev-parse -q --verify "refs/tags/$RELEASE_TAG^{commit}" || echo "")
          if [ -n "$EXISTING" ]; then
            if [ "$EXISTING" != "$GITHUB_SHA" ]; then
              echo "Release tag $RELEASE_TAG points at $EXISTING, not this workflow commit $GITHUB_SHA."
              exit 1
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git tag $RELEASE_TAG $GITHUB_SHA
            git push origin "refs/tags/$RELEASE_TAG"
          else
            echo "Release tag $RELEASE_TAG was not found after checkout."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.19.5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-downloads
          merge-multiple: true

      - name: Move artifacts to dist
        run: |
          mkdir -p dist
          mv dist-downloads/* dist/

      - name: Install app dependencies
        run: node scripts/ci-install.js

      - name: Build release notes
        run: node scripts/extract-release-notes.js

      - name: Upload release assets to VirusTotal
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          node scripts/upload-virustotal-release-assets.js

      - name: Verify release assets
        run: npm run release:verify-assets -- --require-virustotal

      - name: Add VirusTotal links to release notes
        run: |
          cat dist/virustotal-links.md >> dist/release-notes.md

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: dist/release-notes.md
          fail_on_unmatched_files: true
          files: |
            dist/*.exe
            dist/*.rbxmx
            dist/*.dmg
            dist/*.AppImage

  discord:
    name: Announce on Discord
    needs: release
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Set release info
        id: release_info
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "url=https://github.com/${{ github.repository }}/releases/tag/${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "url=https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tagged release
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release_info.outputs.tag }}

      - name: Post tagged changelog to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_info.outputs.tag }}
          RELEASE_NAME: ${{ steps.release_info.outputs.name }}
          RELEASE_URL: ${{ steps.release_info.outputs.url }}
          RELEASE_PRERELEASE: ${{ steps.release_info.outputs.prerelease }}
          RELEASE_EVENT_ACTION: ${{ github.event.action }}
          DISCORD_RELEASE_ROLE_ID: '1457029900291670210'
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import time
          import urllib.request

          webhook_url = os.environ.get("DISCORD_WEBHOOK_URL", "").strip()
          github_token = os.environ.get("GITHUB_TOKEN", "").strip()
          repo = os.environ.get("GITHUB_REPOSITORY", "").strip()
          release_tag = os.environ.get("RELEASE_TAG", "").strip()
          release_name = os.environ.get("RELEASE_NAME", "").strip() or release_tag
          release_url = os.environ.get("RELEASE_URL", "").strip()
          prerelease = os.environ.get("RELEASE_PRERELEASE") == "true"
          event_action = os.environ.get("RELEASE_EVENT_ACTION", "").strip()
          is_release_edit = event_action == "edited"
          role_id = os.environ.get("DISCORD_RELEASE_ROLE_ID", "").strip()
          release_record_cache = None

          if not webhook_url:
              raise RuntimeError("Missing DISCORD_RELEASE_WEBHOOK secret.")
          if not release_tag:
              raise RuntimeError("Missing release tag.")

          def github_api(path):
              request = urllib.request.Request(
                  f"https://api.github.com{path}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {github_token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "ISpooferMotion-Release-Webhook",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read().decode("utf-8"))

          def get_release_by_tag():
              global release_record_cache
              if release_record_cache is not None:
                  return release_record_cache
              if not repo or not release_tag or not github_token:
                  return {}
              try:
                  release_record_cache = github_api(f"/repos/{repo}/releases/tags/{release_tag}")
                  return release_record_cache
              except Exception:
                  return {}

          def download_github_asset(asset):
              request = urllib.request.Request(
                  asset["url"],
                  headers={
                      "Accept": "application/octet-stream",
                      "Authorization": f"Bearer {github_token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "ISpooferMotion-Release-Webhook",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return response.read().decode("utf-8")

          def read_virustotal_links():
              asset = None
              release = {}
              for attempt in range(6):
                  release = get_release_by_tag()
                  assets = release.get("assets") or []
                  asset = next((item for item in assets if item.get("name") == "virustotal-links.json"), None)
                  if asset:
                      break
                  if attempt < 5:
                      time.sleep(10)

              if not asset:
                  release_body = release.get("body") or ""
                  lines = []
                  for line in release_body.splitlines():
                      if "| `" not in line or "[View scan](" not in line:
                          continue
                      cells = [part.strip() for part in line.strip().strip("|").split("|")]
                      if len(cells) < 3:
                          continue
                      name = cells[0].strip("`")
                      sha256 = cells[1].strip("`")
                      url_match = re.search(r"\]\(([^)]+)\)", cells[2])
                      if url_match:
                          short_hash = sha256[:12] if sha256 else "scan"
                          lines.append(f"[`{name}`]({url_match.group(1)}) `{short_hash}`")
                  if lines:
                      value = "\n".join(lines)
                      if len(value) > 1000:
                          return f"Too many VirusTotal links to fit cleanly here. [Open the release notes]({release_url})"
                      return value
                  return "See VirusTotal results in the GitHub release notes."

              try:
                  payload = json.loads(download_github_asset(asset))
              except Exception:
                  return f"[Open VirusTotal report asset]({asset.get('browser_download_url', release_url)})"

              if isinstance(payload, list):
                  rows = payload
                  skipped = False
                  skipped_reason = ""
              else:
                  rows = payload.get("assets") or []
                  skipped = bool(payload.get("skipped"))
                  skipped_reason = payload.get("skippedReason") or ""

              if skipped:
                  return f"VirusTotal upload skipped: {skipped_reason or 'not configured'}."

              lines = []
              for row in rows:
                  name = row.get("name", "Release asset")
                  url = row.get("fileUrl") or row.get("file_url") or row.get("analysisUrl") or row.get("analysis_url")
                  sha256 = row.get("sha256", "")
                  
                  pretty_name = name
                  if "-win-" in name and name.endswith(".exe"): pretty_name = "Windows Setup (.exe)"
                  elif "Plugin" in name and name.endswith(".rbxmx"): pretty_name = "Roblox Plugin (.rbxmx)"
                  elif "-mac-universal.dmg" in name or name.endswith(".dmg"): pretty_name = "macOS App (Universal)"
                  elif "AppImage" in name: pretty_name = "Linux Portable (.AppImage)"

                  if url:
                      lines.append(f"• [{pretty_name}]({url})")

              if not lines:
                  return f"[Open VirusTotal report asset]({asset.get('browser_download_url', release_url)})"

              value = "\n".join(lines)
              if len(value) > 1000:
                  return f"Too many VirusTotal links to fit cleanly here. [Open the full report]({asset.get('browser_download_url', release_url)})"
              return value

          def read_version_changelog():
              changelog_path = "CHANGELOG.md"
              if not os.path.exists(changelog_path):
                  raise RuntimeError("CHANGELOG.md was not found in the tagged release.")

              with open(changelog_path, "r", encoding="utf-8") as file:
                  changelog = file.read()

              escaped_tag = re.escape(release_tag)
              escaped_no_v = re.escape(release_tag.lstrip("v"))
              patterns = [
                  rf"^##\s+\[?{escaped_tag}\]?\s*$",
                  rf"^##\s+\[?v?{escaped_no_v}\]?\s*$",
              ]

              match = None
              for pattern in patterns:
                  match = re.search(pattern, changelog, flags=re.MULTILINE)
                  if match:
                      break
              if not match:
                  raise RuntimeError(f"No changelog section found for {release_tag}.")

              start = match.end()
              next_section = re.search(r"^##\s+", changelog[start:], flags=re.MULTILINE)
              end = start + next_section.start() if next_section else len(changelog)
              section = changelog[start:end].strip()
              return section or "No changelog entries were found for this version."

          def sanitize_release_changes(text):
              lines = text.splitlines()
              kept = []
              skipping = False
              saw_content = False
              release_title_pattern = rf"^\s{{0,3}}#{{1,6}}\s+ISpooferMotion\s+{re.escape(release_tag)}\s*$"
              for line in lines:
                  if not saw_content and not line.strip():
                      continue
                  if not saw_content and re.match(release_title_pattern, line, flags=re.IGNORECASE):
                      saw_content = True
                      continue
                  saw_content = True
                  if re.match(r"^\s{0,3}#{1,6}\s+VirusTotal results\b", line, flags=re.IGNORECASE):
                      skipping = True
                      continue
                  if skipping and re.match(r"^\s{0,3}#{1,6}\s+", line):
                      skipping = False
                  if not skipping:
                      kept.append(line)
              return re.sub(r"\n{3,}", "\n\n", "\n".join(kept)).strip()

          def read_release_changes():
              release = get_release_by_tag()
              release_body = sanitize_release_changes(release.get("body") or "")
              if release_body:
                  return release_body
              return sanitize_release_changes(read_version_changelog())

          def get_commit_author():
              fallback = {"name": "GitHub", "url": release_url, "avatar": None}
              if not repo or not github_token:
                  return fallback
              try:
                  commit = github_api(f"/repos/{repo}/commits/{release_tag}")
              except Exception:
                  return fallback

              github_author = commit.get("author") or {}
              commit_author = (commit.get("commit") or {}).get("author") or {}
              return {
                  "name": github_author.get("login") or commit_author.get("name") or "GitHub",
                  "url": github_author.get("html_url") or release_url,
                  "avatar": github_author.get("avatar_url"),
              }

          changelog_text = read_release_changes()
          virustotal_links = read_virustotal_links()
          author = get_commit_author()

          changelog_field = f"Too much changed to fit cleanly here.\n\n[Read the release notes]({release_url})" if len(changelog_text) > 1000 else changelog_text
          color = 3447003 if is_release_edit else (16753920 if prerelease else 5763719)
          headline = "Release notes were updated" if is_release_edit else ("New test build is ready" if prerelease else "New update is live")
          description = (
              "The GitHub release notes were updated. Open the release below to see the latest changes."
              if is_release_edit
              else "ISpooferMotion has been updated. Grab the latest release from GitHub below."
          )

          embed = {
              "author": {"name": "ISpooferMotion Updates", "icon_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"},
              "title": f"🚀 ISpooferMotion {release_tag} is now available!",
              "url": release_url,
              "description": f"{changelog_field}",
              "color": color,
              "fields": [
                  {"name": "🛡️ VirusTotal Scans", "value": virustotal_links, "inline": False},
                  {"name": "📥 Download", "value": f"**[Get it on GitHub]({release_url})**", "inline": False},
              ],
              "footer": {"text": f"Released by {author['name']}", "icon_url": author["avatar"] if author["avatar"] else None},
          }

          payload = {
              "username": "ISpooferMotion Updates",
              "content": (
                  f"<@&{role_id}> ISpooferMotion release notes were updated.\n\n"
                  if is_release_edit
                  else f"<@&{role_id}> ISpooferMotion has updated!\n\n"
              ),
              "allowed_mentions": {"roles": [role_id]},
              "embeds": [embed],
          }

          request = urllib.request.Request(
              webhook_url,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json", "User-Agent": "ISpooferMotion-Discord-Release-Webhook"},
              method="POST",
          )
          with urllib.request.urlopen(request) as response:
              if response.status >= 300:
                  raise RuntimeError(f"Discord webhook failed with status {response.status}")

          print(f"Posted Discord release announcement for {release_tag}.")
          PY
