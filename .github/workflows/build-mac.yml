name: Build macOS App

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mac:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run release hardening check
        run: npm run release:hardening-check

      - name: Build macOS app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build -- --mac --${{ matrix.arch }} --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ISpooferMotion-macOS-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
